name: Build Janus Gateway .deb (Trixie armhf)

on:
  workflow_dispatch:
    inputs:
      janus_version:
        description: "Janus Gateway version tag (e.g. v1.2.4)"
        required: true
        default: "v1.2.4"

jobs:
  build-armhf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for armhf emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Create output directory
        run: mkdir -p output

      - name: Build Janus in Trixie armhf container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -e JANUS_VERSION="${{ inputs.janus_version }}" \
            -v ${{ github.workspace }}/output:/output \
            debian:trixie bash -exc '
              export DEBIAN_FRONTEND=noninteractive
              JANUS_VERSION_NUM="${JANUS_VERSION#v}"

              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential pkg-config git ca-certificates \
                automake autoconf libtool gengetopt \
                libmicrohttpd-dev libjansson-dev libssl-dev \
                libsrtp2-dev libglib2.0-dev libnice-dev \
                libwebsockets-dev libconfig-dev libcurl4-openssl-dev \
                libopus-dev libogg-dev

              # Clone janus-gateway at requested version
              cd /tmp
              git clone --depth 1 --branch ${JANUS_VERSION} \
                https://github.com/meetecho/janus-gateway.git
              cd janus-gateway

              # Build with autotools
              sh autogen.sh
              ./configure --prefix=/usr \
                --disable-docs \
                --disable-data-channels \
                --disable-rabbitmq \
                --disable-mqtt \
                --disable-nanomsg \
                --disable-unix-sockets \
                --enable-websockets \
                --enable-turn-rest-api
              make -j$(nproc)

              # Install to staging directory
              make DESTDIR=/tmp/janus-staging install

              # ── Package as .deb ──
              # Package name is "janus" to match upstream dpkg -L janus used by
              # moonraker_obico/janus_config_builder.py find_system_janus_paths()
              PKG_DIR="/tmp/janus_${JANUS_VERSION_NUM}_armhf"
              mkdir -p "${PKG_DIR}/DEBIAN"
              cp -a /tmp/janus-staging/usr "${PKG_DIR}/"

              # Remove unnecessary files to keep .deb small
              rm -rf "${PKG_DIR}/usr/share/doc" \
                     "${PKG_DIR}/usr/share/man" \
                     "${PKG_DIR}/usr/include"

              # Create temporary debian/control for dpkg-shlibdeps
              mkdir -p /tmp/dpkg-work/debian
              cat > /tmp/dpkg-work/debian/control <<DCTRL
Source: janus
Section: net
Priority: optional
Maintainer: Yumi-Lab <contact@yumi-lab.com>

Package: janus
Architecture: armhf
Description: Janus WebRTC Server
DCTRL

              # Detect shared library dependencies automatically
              cd /tmp/dpkg-work
              DEPS=$(dpkg-shlibdeps -O \
                ${PKG_DIR}/usr/bin/janus \
                ${PKG_DIR}/usr/lib/janus/plugins/*.so \
                ${PKG_DIR}/usr/lib/janus/transports/*.so \
                2>&1 | grep "^shlibs:Depends=" | sed "s/^shlibs:Depends=//") || true
              cd /tmp

              # Fallback if dpkg-shlibdeps fails
              if [ -z "$DEPS" ]; then
                DEPS="libglib2.0-0t64, libjansson4, libnice10, libssl3t64, libsrtp2-1, libwebsockets19t64, libmicrohttpd12t64, libconfig11, libcurl4t64"
              fi

              cat > "${PKG_DIR}/DEBIAN/control" <<CTRL
Package: janus
Version: ${JANUS_VERSION_NUM}
Section: net
Priority: optional
Architecture: armhf
Depends: ${DEPS}
Provides: janus-gateway
Maintainer: Yumi-Lab <contact@yumi-lab.com>
Homepage: https://github.com/meetecho/janus-gateway
Description: Janus WebRTC Server (Trixie armhf cross-build)
 Pre-built Janus Gateway for Debian 13 Trixie armhf.
 Built from janus-gateway upstream for systems where the
 official Debian package is unavailable.
CTRL

              dpkg-deb --build --root-owner-group "${PKG_DIR}"

              DEB_FILE="/tmp/janus_${JANUS_VERSION_NUM}_armhf.deb"
              cp "${DEB_FILE}" /output/
              echo "Built: $(ls -lh ${DEB_FILE})"
              dpkg-deb --info "${DEB_FILE}"
            '

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: janus-gateway-armhf-trixie
          path: output/*.deb

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: janus-${{ inputs.janus_version }}-trixie-armhf
          name: "Janus Gateway ${{ inputs.janus_version }} (Trixie armhf)"
          body: |
            Pre-compiled Janus WebRTC Gateway for **Debian 13 Trixie armhf** (ARM Cortex-A7).

            Built from [janus-gateway ${{ inputs.janus_version }}](https://github.com/meetecho/janus-gateway/releases/tag/${{ inputs.janus_version }}).

            ### Installation
            ```bash
            curl -L -o /tmp/janus-gateway.deb <asset-url>
            sudo dpkg -i /tmp/janus-gateway.deb
            sudo apt-get install -f -y
            ```
          files: output/*.deb
          draft: false
          prerelease: false

